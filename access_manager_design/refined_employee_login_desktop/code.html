<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Digital Vault | Secure Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error": "#ba1a1a",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#071e27",
              "secondary-fixed": "#cfe6f2",
              "primary-container": "#002855",
              "on-tertiary-fixed-variant": "#6d3918",
              "surface-bright": "#fcf9f8",
              "secondary-fixed-dim": "#b4cad6",
              "surface-container-highest": "#e5e2e1",
              "on-surface-variant": "#43474f",
              "on-background": "#1c1b1b",
              "surface-dim": "#dcd9d9",
              "on-error-container": "#93000a",
              "tertiary": "#280c00",
              "secondary": "#4c616c",
              "on-secondary-container": "#526772",
              "primary-fixed": "#d6e3ff",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#a9c7ff",
              "outline": "#74777f",
              "outline-variant": "#c3c6d0",
              "inverse-primary": "#a9c7ff",
              "primary": "#001430",
              "inverse-on-surface": "#f3f0ef",
              "surface-container-low": "#f6f3f2",
              "on-surface": "#1c1b1b",
              "on-secondary": "#ffffff",
              "on-primary-fixed": "#001b3d",
              "on-error": "#ffffff",
              "tertiary-fixed-dim": "#ffb68e",
              "on-primary-fixed-variant": "#0e4686",
              "on-tertiary-container": "#c48059",
              "tertiary-fixed": "#ffdbca",
              "surface-tint": "#305ea0",
              "on-primary-container": "#6691d6",
              "on-secondary-fixed-variant": "#354a53",
              "tertiary-container": "#481c00",
              "surface-container-high": "#ebe7e7",
              "surface-variant": "#e5e2e1",
              "secondary-container": "#cfe6f2",
              "error-container": "#ffdad6",
              "surface-container": "#f0edec",
              "surface": "#ffffff",
              "on-primary": "#ffffff",
              "on-tertiary-fixed": "#331200",
              "inverse-surface": "#313030",
              "background": "#ffffff"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-md bg-white">
<!-- Branding -->
<div class="flex flex-col items-center mb-12">
<div class="bg-primary text-on-primary p-3 rounded-lg mb-4">
<span class="material-symbols-outlined text-3xl block" data-icon="lock">lock</span>
</div>
<h1 class="text-xl font-black tracking-tighter text-primary">THE VAULT</h1>
</div>
<div class="space-y-8">
<div class="text-center">
<h2 class="text-4xl font-extrabold tracking-tight text-primary mb-3">Welcome back</h2>
<p class="text-on-surface-variant font-medium">Enter your credentials to access the workspace.</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-primary font-bold text-sm tracking-tight" for="email">Work Email</label>
<div class="relative">
<input aria-label="Work Email" class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 text-on-surface rounded-lg" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="text-primary font-bold text-sm tracking-tight" for="password">Password</label>
<a class="text-surface-tint font-bold text-xs hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<input aria-label="Password" class="w-full h-12 px-4 bg-surface-container-low border border-outline-variant focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 text-on-surface rounded-lg" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-2">
<button class="w-full h-12 bg-primary text-on-primary font-bold text-sm tracking-wide rounded-lg hover:bg-primary-container hover:text-on-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Divider -->
<div class="relative py-4">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-[10px] uppercase">
<span class="bg-white px-4 text-outline font-bold tracking-widest">Enterprise Identity</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-3">
<button class="flex h-11 items-center justify-center gap-2 border border-outline-variant rounded-lg text-on-surface font-bold text-xs hover:bg-surface-container transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="cloud">cloud</span>
                        Okta
                    </button>
<button class="flex h-11 items-center justify-center gap-2 border border-outline-variant rounded-lg text-on-surface font-bold text-xs hover:bg-surface-container transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="shield">shield</span>
                        Azure AD
                    </button>
</div>
</form>
<footer class="pt-8 text-center border-t border-outline-variant/30">
<p class="text-on-surface-variant text-[10px] font-bold tracking-widest mb-4">SECURED BY ENTERPRISE ENCRYPTION</p>
<div class="flex justify-center gap-6 text-xs font-semibold text-outline">
<a class="hover:text-primary transition-colors" href="#">Legal</a>
<a class="hover:text-primary transition-colors" href="#">Security</a>
<a class="hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</div>
</main>
</body></html>
